name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        run: |
          git config --global credential.helper store
          echo "https://zaidmazen:${{ secrets.HF_TOKEN }}@huggingface.co" > ~/.git-credentials
          git remote add hf https://huggingface.co/spaces/zaidmazen/jordan-syb-agent
          git push hf main --force
